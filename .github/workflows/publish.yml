# 通过 GitHub Actions 发布到 npm 并生成 provenance（2026-05-01 起 Creator Portal 验证要求）
# 参考：https://docs.n8n.io/integrations/community-nodes/build-community-nodes/
#
# 需在 GitHub 仓库设置 Secrets：NPM_TOKEN（npm Granular Token，具备该包 publish 权限）
# 或通过 npm Trusted Publisher（OIDC）绑定本仓库与本 workflow，可不使用长期 token（见 npm 文档）
#
# · push 到 main：verify 通过后，仅当 package.json 的 version 相对上一提交有变化时 npm publish
# · push tag（*.*.* / v*.*.*）：verify 通过后始终 publish（tag 视为发版信号）
# · PR 对准 main：仅 verify（不发布）
# · workflow_dispatch：手动 publish（重试 / 紧急发版）
# registry 上若已存在同版本号，npm publish 会失败。

name: Publish

on:
  push:
    branches:
      - main
    tags:
      - '*.*.*' # 如 0.2.37（npm version 若配置 tagVersionPrefix=""）
      - 'v*.*.*' # 如 v0.2.37（npm version 默认）
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (n8n community ESLint)
        run: npm run verify

  should-publish:
    name: Should publish?
    needs: verify
    if: success() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.decide.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - id: decide
        shell: bash
        run: |
          publish=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            publish=true
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.ref }}" == refs/tags/* ]]; then
              publish=true
            elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              BEFORE="${{ github.event.before }}"
              VER_AFTER=$(node -p "require('./package.json').version")
              if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
                publish=true
              elif git show "$BEFORE:package.json" > /tmp/before-package.json 2>/dev/null; then
                VER_BEFORE=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/before-package.json','utf8')).version")
                if [[ "$VER_BEFORE" != "$VER_AFTER" ]]; then
                  publish=true
                fi
              else
                echo "::notice::无法在 before 提交中读取 package.json，默认执行发布"
                publish=true
              fi
            fi
          fi
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish to npm
    needs: [verify, should-publish]
    if: success() && needs.should-publish.outputs.publish == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: npm-publish-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Require NPM_TOKEN secret
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::未配置仓库 Secret「NPM_TOKEN」。请到 Settings → Secrets and variables → Actions → New repository secret，填入 npm Granular Token（需具备本包 publish 权限）。"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
